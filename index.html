<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad XP/Retro Mix Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #FFFFFF; 
            
            /* Palette Rosa (Default) */
            --win-frame: #A03050;      /* Bordo esterno scuro */
            --title-bg-start: #FFDDEE; /* Sfumatura titolo (alto) */
            --title-bg-end: #F4AABF;   /* Sfumatura titolo (basso) */
            --title-text: #000000;
            
            --sys-bg: #F0BBD0;         /* Sfondo menù e finestra */
            --text-bg: #FFF0F5;        /* Sfondo foglio */
            --text-color: #000000;
            
            --border-dark: #000000;
            --border-light: #ffffff;
            --border-shadow: #888888;
            --highlight: #2151DC;     /* Blu classico selezione XP */
            --highlight-text: #ffffff;
        }

        /* --- Sfondo di Notion --- */
        [data-mode="dark"] {
            --page-bg: #191919;
            --text-bg: #2a1a20; 
            --text-color: #f0f0f0;
        }
        [data-mode="beige"] { --page-bg: #F7F6F3; }

        /* --- Palette Colori Dinamiche --- */
        [data-palette="pink"] {
            --title-bg-start: #FFDDEE; --title-bg-end: #F4AABF; --sys-bg: #F0BBD0; --text-bg: #FFF0F5;
        }
        [data-palette="green"] {
            --title-bg-start: #DDEEFF; --title-bg-end: #AAF4B1; --sys-bg: #BBF0BF; --text-bg: #F0FFF0;
            --win-frame: #30A050;
        }
        [data-palette="blue"] {
            --title-bg-start: #DDEEFF; --title-bg-end: #AABFF4; --sys-bg: #BBCCF0; --text-bg: #F0F5FF;
            --win-frame: #3050A0;
        }
        [data-palette="purple"] {
            --title-bg-start: #EEDDFF; --title-bg-end: #BFFAF4; --sys-bg: #CCBBF0; --text-bg: #F5F0FF;
            --win-frame: #5030A0;
        }

        /* Aggiustamenti Dark mode per il testo */
        [data-mode="dark"] textarea { color: var(--page-bg); }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        * { box-sizing: border-box; }

        /* --- LA FINESTRA PRINCIPALE (Curve XP) --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--sys-bg);
            border: 3px solid var(--win-frame);
            /* Angoli arrotondati superiori morbidi */
            border-radius: 8px 8px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex; flex-direction: column;
            /* RIMOSSO overflow: hidden; PERCHÉ BLOCCAVA I MENÙ! */
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* --- BARRA DEL TITOLO (Sfumata) --- */
        .title-bar {
            display: flex; justify-content: space-between; align-items: center;
            height: 30px; padding: 0 8px;
            background: linear-gradient(to bottom, var(--title-bg-start) 0%, var(--title-bg-end) 50%, var(--title-bg-end) 100%);
            border-bottom: 1px solid var(--win-frame);
            /* Arrotonda anche l'intestazione per seguire la finestra */
            border-radius: 5px 5px 0 0; 
        }
        
        .sys-icon-box {
            width: 22px; height: 22px;
            display: flex; justify-content: center; align-items: center;
        }
        .sys-icon-inner { 
            width: 16px; height: 16px; 
            background: linear-gradient(135deg, #fff 0%, #dcdcdc 100%);
            border: 1px solid #888; border-radius: 2px;
        }

        .title-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 14px; font-weight: bold;
            color: var(--title-text);
            flex-grow: 1; text-align: center;
        }

        /* --- PULSANTI FINESTRA (Ripristinati a stile Retro Quadrato!) --- */
        .window-btns { display: flex; gap: 2px; }
        .win-btn {
            width: 20px; height: 20px;
            border: 2px solid var(--border-dark);
            background-color: var(--sys-bg);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: inset 1px 1px var(--border-light);
            color: var(--border-dark);
        }
        .win-btn:active { background-color: var(--border-dark); color: var(--border-light); box-shadow: none; }
        .icon-min { width: 8px; height: 2px; background: currentColor; margin-top: 8px; }
        .icon-max { width: 10px; height: 8px; border: 2px solid currentColor; border-top-width: 3px; }
        .icon-close { font-family: sans-serif; font-size: 16px; line-height: 1; margin-bottom: 2px; font-weight: bold; }

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; gap: 3px; padding: 3px 8px;
            font-size: 20px; color: #000;
            background-color: var(--sys-bg);
            border-bottom: 1px solid var(--border-shadow);
        }
        
        .menu-item {
            padding: 1px 8px; cursor: pointer; user-select: none;
            border-radius: 2px; position: relative;
        }
        .menu-item:hover, .menu-item.active { 
            background-color: var(--highlight); 
            color: var(--highlight-text); 
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: 100%; left: 0;
            background-color: var(--sys-bg); min-width: 170px;
            border: 1px solid var(--border-shadow);
            z-index: 100; color: #000; padding: 2px;
            border-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); /* Ombra morbida moderna */
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 4px 10px; font-size: 20px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            border-radius: 2px;
        }
        .dropdown-item:hover { 
            background-color: var(--highlight); 
            color: var(--highlight-text); 
        }
        .dropdown-divider { height: 1px; background-color: var(--border-shadow); margin: 4px 5px; }
        .menu-icon { width: 22px; text-align: center; font-size: 18px; filter: grayscale(1); }
        .color-preview {
            width: 14px; height: 14px; border: 1px solid var(--border-dark);
            display: inline-block; margin-right: 4px; border-radius: 2px;
        }

        /* --- AREA DI TESTO --- */
        .window-body {
            flex-grow: 1; padding: 4px; display: flex;
            background-color: var(--sys-bg);
            /* Importante per non far strabordare l'area di testo */
            overflow: hidden; 
        }
        .textarea-container {
            flex-grow: 1; border: 1px solid var(--border-shadow);
            background-color: var(--text-bg);
            display: flex;
            border-radius: 2px; 
            overflow: hidden;
        }

        textarea {
            flex-grow: 1; resize: none; box-sizing: border-box;
            background-color: transparent; 
            color: var(--text-color);
            padding: 10px; outline: none; border: none;
        }
        
        /* Gestione Font Area Testo */
        [data-font="pixel"] textarea { font-family: 'VT323', monospace; font-size: 26px; }
        [data-font="arial"] textarea { font-family: Arial, Helvetica, sans-serif; font-size: 16px; line-height: 1.5; }

        /* --- SCROLLBAR XP Style --- */
        textarea::-webkit-scrollbar { width: 18px; background: #E1E1E1; }
        textarea::-webkit-scrollbar-track { background: #E1E1E1; border-left: 1px solid #BFBFBF; }
        
        textarea::-webkit-scrollbar-thumb { 
            background: linear-gradient(to right, #FFF 0%, var(--title-bg-end) 50%, var(--title-bg-end) 100%);
            border: 1px solid var(--win-frame);
            border-radius: 9px;
        }
        
        textarea::-webkit-scrollbar-button { 
            display: block; height: 18px; 
            background-color: #E1E1E1;
            border: 1px solid #BFBFBF;
            border-radius: 4px;
        }
        textarea::-webkit-scrollbar-button:vertical:start:decrement { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,8 9,8 5,2" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 10px;
        }
        textarea::-webkit-scrollbar-button:vertical:end:increment { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,2 9,2 5,8" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 10px;
        }
    </style>
</head>
<body data-mode="light" data-palette="pink" data-font="pixel">

    <div class="window">
        <div class="title-bar">
            <div class="sys-icon-box"><div class="sys-icon-inner"></div></div>
            <div class="title-text">Nota Rapida</div>
            <div class="window-btns">
                <div class="win-btn"><div class="icon-min"></div></div>
                <div class="win-btn"><div class="icon-max"></div></div>
                <div class="win-btn"><div class="icon-close">x</div></div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')"><span class="menu-icon">📄</span> New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')"><span class="menu-icon">💾</span> Save As...</div>
                    <div class="dropdown-item" onclick="document.getElementById('file-input').click()"><span class="menu-icon">📂</span> Open...</div>
                    <input type="file" id="file-input" accept=".txt" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item" onclick="menuAction('undo')"><span class="menu-icon">↶</span> Undo</div>
                    <div class="dropdown-item" onclick="menuAction('redo')"><span class="menu-icon">↷</span> Redo</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('cut')"><span class="menu-icon">✂</span> Cut</div>
                    <div class="dropdown-item" onclick="menuAction('copy')"><span class="menu-icon">📑</span> Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')"><span class="menu-icon">📋</span> Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')"><span class="menu-icon">☑</span> Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')"><span class="menu-icon">☀️</span> Luce</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')"><span class="menu-icon">📜</span> Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')"><span class="menu-icon">🌙</span> Notte</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #F0BBD0;"></span> Tema Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #CCBBF0;"></span> Tema Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #BBCCF0;"></span> Tema Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #BBF0BF;"></span> Tema Verde
                    </div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setTextFont('pixel')"><span class="menu-icon">A</span> Font: Pixel</div>
                    <div class="dropdown-item" onclick="setTextFont('arial')"><span class="menu-icon">A</span> Font: Arial</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Notepad Retro-Modern Mix\nDati salvati localmente.')"><span class="menu-icon">❓</span> About</div>
                </div>
            </div>
        </div>

        <div class="window-body">
            <div class="textarea-container">
                <textarea id="notepad-text" spellcheck="false" placeholder="Inizia a digitare qui..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // --- SALVATAGGIO TESTO LOCALE ---
        textarea.value = localStorage.getItem('notion-xp-notepad-v5') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-xp-notepad-v5', textarea.value);
        });

        // --- GESTIONE PREFERENZE GRAFICHE E FONT ---
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-notepad-mode-v5', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-notepad-palette-v5', palette);
        }
        function setTextFont(fontType) {
            document.body.setAttribute('data-font', fontType);
            localStorage.setItem('notion-notepad-font-v5', fontType);
        }

        setNotionMode(localStorage.getItem('notion-notepad-mode-v5') || 'light');
        setThemePalette(localStorage.getItem('notion-notepad-palette-v5') || 'pink');
        setTextFont(localStorage.getItem('notion-notepad-font-v5') || 'pixel');

        // --- LOGICA DI APERTURA E CHIUSURA MENÙ ---
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // --- AZIONI DEI PULSANTI (File ed Edit) ---
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Sei sicuro di voler svuotare il blocco note?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-xp-notepad-v5', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'undo':
                    document.execCommand('undo'); 
                    break;
                case 'redo':
                    document.execCommand('redo'); 
                    break;
                case 'cut':
                    textarea.select();
                    document.execCommand('cut');
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-xp-notepad-v5', textarea.value);
                    } catch (err) {
                        alert("Usa la scorciatoia Ctrl+V (o Cmd+V) per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }

        // --- IMPORTARE UN FILE ESTERNO ---
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                textarea.value = e.target.result;
                localStorage.setItem('notion-xp-notepad-v5', textarea.value);
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }
    </script>
</body>
</html>
