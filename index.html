<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Win Notepad per Notion</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sfondo di Notion (Light Mode di default) */
            --page-bg: #FFFFFF; 
            
            /* Colori del tema Rosa (Default) */
            --win-bg: #f4b6c2;
            --title-bg: #e58da1;
            --title-text: #000000;
            --menu-bg: #f4b6c2;
            --text-bg: #fdf0f4;
            --text-color: #000000;
            
            /* Colori di sistema classici */
            --border-dark: #000000;
            --border-light: #ffffff;
            --border-shadow: #888888;
            --highlight: #000080; /* Blu classico selezione Windows */
            --highlight-text: #ffffff;
        }

        /* --- SFONDI NOTION --- */
        [data-mode="dark"] {
            --page-bg: #191919;
            /* Testo più leggibile in dark mode */
            --text-bg: #2a1a20; 
            --text-color: #f0f0f0;
        }
        [data-mode="beige"] {
            --page-bg: #F7F6F3;
        }

        /* --- PALETTE COLORI (Stile Win95) --- */
        [data-palette="pink"] {
            --win-bg: #f4b6c2; --title-bg: #e58da1; --menu-bg: #f4b6c2; --text-bg: #fdf0f4;
        }
        [data-palette="green"] {
            --win-bg: #b6f4b6; --title-bg: #8de58d; --menu-bg: #b6f4b6; --text-bg: #f0fdf0;
        }
        [data-palette="blue"] {
            --win-bg: #b6c2f4; --title-bg: #8da1e5; --menu-bg: #b6c2f4; --text-bg: #f0f4fd;
        }
        [data-palette="purple"] {
            --win-bg: #dcb6f4; --title-bg: #c28de5; --menu-bg: #dcb6f4; --text-bg: #faf0fd;
        }

        /* Aggiustamenti per la Dark Mode */
        [data-mode="dark"][data-palette="green"] { --text-bg: #1a2a1a; }
        [data-mode="dark"][data-palette="blue"] { --text-bg: #1a1e2a; }
        [data-mode="dark"][data-palette="purple"] { --text-bg: #261a2a; }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        /* --- LA FINESTRA RETRÒ (Win95 Style) --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--win-bg);
            /* Bordo 3D Windows */
            border-top: 2px solid var(--border-light);
            border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark);
            border-bottom: 2px solid var(--border-dark);
            box-shadow: inset -1px -1px var(--border-shadow);
            display: flex; flex-direction: column;
            transition: background-color 0.3s ease;
            box-sizing: border-box;
        }

        /* --- BARRA DEL TITOLO --- */
        .title-bar {
            background-color: var(--title-bg);
            color: var(--title-text);
            padding: 3px 6px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 20px; font-weight: bold;
            margin: 2px;
            border: 1px solid var(--border-dark);
        }
        .title-bar-text { display: flex; align-items: center; gap: 8px; }
        .title-icon { font-size: 16px; }
        
        .title-controls { display: flex; gap: 3px; }
        .control-btn {
            width: 20px; height: 20px;
            background-color: var(--win-bg); color: #000;
            border-top: 2px solid var(--border-light); border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark); border-bottom: 2px solid var(--border-dark);
            font-family: 'VT323', monospace; font-size: 16px;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            line-height: 1; padding-bottom: 2px; box-sizing: border-box;
        }
        .control-btn:active {
            border-top: 2px solid var(--border-dark); border-left: 2px solid var(--border-dark);
            border-right: 2px solid var(--border-light); border-bottom: 2px solid var(--border-light);
            padding-top: 2px; padding-bottom: 0;
        }

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; gap: 5px; padding: 2px 8px;
            font-size: 20px; color: #000; position: relative;
            background-color: var(--menu-bg);
            border-bottom: 1px solid var(--border-shadow);
        }
        
        .menu-item {
            padding: 2px 8px; cursor: pointer; position: relative; user-select: none;
        }
        .menu-item:hover, .menu-item.active { 
            background-color: var(--highlight); 
            color: var(--highlight-text); 
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: 100%; left: 0;
            background-color: var(--menu-bg); min-width: 160px;
            border-top: 2px solid var(--border-light); border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark); border-bottom: 2px solid var(--border-dark);
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2); z-index: 100;
            color: #000; padding: 2px;
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 4px 10px; font-size: 20px;
            display: flex; align-items: center; gap: 10px;
        }
        .dropdown-item:hover { 
            background-color: var(--highlight); 
            color: var(--highlight-text); 
        }
        .dropdown-divider { 
            height: 1px; background-color: var(--border-shadow); 
            border-bottom: 1px solid var(--border-light); margin: 4px 5px; 
        }

        /* Quadrati per Anteprima Colori */
        .color-preview {
            width: 14px; height: 14px;
            border: 1px solid var(--border-dark);
            display: inline-block;
        }

        /* --- AREA DI TESTO --- */
        .window-body {
            flex-grow: 1; padding: 6px; display: flex;
            background-color: var(--win-bg);
        }
        textarea {
            width: 100%; height: 100%; resize: none; box-sizing: border-box;
            background-color: var(--text-bg); color: var(--text-color);
            font-family: 'VT323', monospace; font-size: 22px; line-height: 1.4;
            padding: 10px; outline: none;
            /* Bordo 3D incassato */
            border-top: 2px solid var(--border-dark); border-left: 2px solid var(--border-dark);
            border-right: 2px solid var(--border-light); border-bottom: 2px solid var(--border-light);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Personalizzazione della barra di scorrimento (Retro Win95 Style) */
        textarea::-webkit-scrollbar { width: 20px; }
        textarea::-webkit-scrollbar-track { 
            background: repeating-linear-gradient(45deg, #fff 0px, #fff 2px, #dfdfdf 2px, #dfdfdf 4px);
            border-left: 1px solid var(--border-dark); 
        }
        textarea::-webkit-scrollbar-thumb { 
            background: var(--win-bg); 
            border-top: 2px solid var(--border-light); border-left: 2px solid var(--border-light);
            border-right: 2px solid var(--border-dark); border-bottom: 2px solid var(--border-dark);
        }

    </style>
</head>
<body data-mode="light" data-palette="pink">

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                <span class="title-icon">🖳</span> Nota Rapida.txt
            </div>
            <div class="title-controls">
                <div class="control-btn">_</div>
                <div class="control-btn">□</div>
                <div class="control-btn">x</div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')">New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')">Save As .txt</div>
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item" onclick="menuAction('copy')">Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')">Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')">Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')">Notion Light</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')">Notion Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')">Notion Dark</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #f4b6c2;"></span> Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #dcb6f4;"></span> Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #b6c2f4;"></span> Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #b6f4b6;"></span> Verde
                    </div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Retro Windows Notepad\nDati salvati automaticamente.\nBy Gemini!')">About</div>
                </div>
            </div>

        </div>

        <div class="window-body">
            <textarea id="notepad-text" spellcheck="false" placeholder="Inizia a digitare qui..."></textarea>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // --- GESTIONE DATI ---
        textarea.value = localStorage.getItem('notion-retro-notepad') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-retro-notepad', textarea.value);
        });

        // --- GESTIONE TEMI E MODALITÀ ---
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-notepad-mode', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-notepad-palette', palette);
        }

        setNotionMode(localStorage.getItem('notion-notepad-mode') || 'light');
        setThemePalette(localStorage.getItem('notion-notepad-palette') || 'pink');

        // --- GESTIONE MENÙ A TENDINA ---
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // --- FUNZIONI DEI MENÙ FILE ED EDIT ---
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Vuoi cancellare tutto il testo?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-retro-notepad', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-retro-notepad', textarea.value);
                    } catch (err) {
                        alert("Usa la scorciatoia Ctrl+V (o Cmd+V) per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }
    </script>
</body>
</html>
