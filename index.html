<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Win 3.1 Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sfondo di Notion */
            --page-bg: #FFFFFF; 
            
            /* Colori esatti campionati (Tema Rosa) */
            --menu-bg: #e89eb4;       /* Rosa medio (finestra e menù) */
            --text-bg: #fae3ea;       /* Rosa chiarissimo (area di testo) */
            --highlight: #000000;     /* Selezione nera */
            --highlight-text: #FFFFFF;/* Testo bianco su selezione */
            --border-color: #000000;
            --bevel-light: #ffffff;   /* Luce del finto 3D */
        }

        /* --- SFONDI NOTION --- */
        [data-mode="dark"] {
            --page-bg: #191919;
            --text-bg: #2a1a20; 
            --highlight: #ffffff;
            --highlight-text: #000000;
        }
        [data-mode="beige"] { --page-bg: #F7F6F3; }

        /* --- PALETTE COLORI --- */
        [data-palette="pink"] {
            --menu-bg: #e89eb4; --text-bg: #fae3ea;
        }
        [data-palette="green"] {
            --menu-bg: #9ce8b4; --text-bg: #e3faea;
        }
        [data-palette="blue"] {
            --menu-bg: #9eb4e8; --text-bg: #e3eafa;
        }
        [data-palette="purple"] {
            --menu-bg: #b49ee8; --text-bg: #eae3fa;
        }
        
        /* Correzione Testo Dark Mode */
        [data-mode="dark"][data-palette="green"] { --text-bg: #1a2a20; }
        [data-mode="dark"][data-palette="blue"] { --text-bg: #1a202a; }
        [data-mode="dark"][data-palette="purple"] { --text-bg: #201a2a; }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        * { box-sizing: border-box; }

        /* --- LA FINESTRA RETRÒ --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--menu-bg);
            border: 2px solid var(--border-color);
            /* Bordo luce 3D interno */
            box-shadow: inset 1px 1px var(--bevel-light);
            display: flex; flex-direction: column;
            transition: background-color 0.3s ease;
        }

        /* --- BARRA DEL TITOLO --- */
        .title-bar {
            padding: 4px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-color);
        }
        
        /* Bottone Sistema (Quadrato a sinistra) */
        .sys-btn {
            width: 22px; height: 22px;
            border: 2px solid var(--border-color);
            background-color: var(--menu-bg);
            box-shadow: inset 1px 1px var(--bevel-light);
            display: flex; justify-content: center; align-items: center;
        }
        .sys-line { width: 12px; height: 3px; background-color: var(--border-color); }
        
        .title-text {
            font-size: 24px; letter-spacing: 1px;
            flex-grow: 1; text-align: center; color: var(--border-color);
        }
        
        /* Bottoni Destri (Min, Max, Close) */
        .window-btns { display: flex; gap: 2px; }
        .win-btn {
            width: 22px; height: 22px;
            border: 2px solid var(--border-color);
            background-color: var(--menu-bg);
            box-shadow: inset 1px 1px var(--bevel-light);
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; cursor: pointer;
        }
        .win-btn:active { 
            box-shadow: inset -1px -1px var(--bevel-light); /* Inverte la luce quando cliccato */
        }
        .icon-min { width: 10px; height: 2px; background: #000; margin-top: 8px;}
        .icon-max { width: 12px; height: 10px; border: 2px solid #000; border-top-width: 3px; }
        .icon-close { font-family: sans-serif; font-size: 16px; line-height: 1; margin-bottom: 2px;}

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; padding-left: 2px;
            border-bottom: 2px solid var(--border-color);
            position: relative; z-index: 10;
        }
        
        .menu-item {
            font-size: 24px; padding: 2px 8px;
            cursor: pointer; position: relative; user-select: none;
            border: 2px solid transparent; 
            margin-bottom: -2px; /* Il trucco per scavalcare il bordo inferiore */
            z-index: 11;
        }
        
        /* Effetto linguetta unita alla tendina */
        .menu-item.active { 
            background-color: var(--menu-bg); 
            border: 2px solid var(--border-color);
            border-bottom: 2px solid var(--menu-bg); /* Nasconde la linea! */
            z-index: 13;
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: calc(100% - 2px); left: -2px;
            background-color: var(--menu-bg); min-width: 200px;
            border: 2px solid var(--border-color);
            z-index: 12; color: var(--border-color);
            padding: 2px;
            /* Ombra Nera Solida Stile 8-bit */
            box-shadow: 4px 4px 0px rgba(0,0,0,1);
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 2px 10px; font-size: 24px;
            display: flex; align-items: center; gap: 8px;
        }
        .dropdown-item:hover { 
            background-color: var(--highlight); 
            color: var(--highlight-text); 
        }
        
        /* Separatore menù */
        .dropdown-divider { 
            height: 2px; background-color: var(--border-color); 
            margin: 4px 2px; 
        }

        /* Testo in grigio (Disabilitato) */
        .disabled-text { color: #888; text-shadow: 1px 1px 0px #fff; }

        /* Icone e Quadrati per Anteprima Colori */
        .menu-icon { width: 24px; text-align: center; display: inline-block; font-size: 18px; filter: grayscale(1); }
        .color-preview {
            width: 14px; height: 14px; border: 2px solid var(--border-color);
            display: inline-block; margin-left: 2px; margin-right: 6px;
        }

        /* --- AREA DI TESTO --- */
        .window-body {
            flex-grow: 1; display: flex;
            background-color: var(--menu-bg); padding: 4px;
        }
        textarea {
            width: 100%; height: 100%; resize: none; box-sizing: border-box;
            background-color: var(--text-bg); 
            color: var(--border-color);
            font-family: 'VT323', monospace; font-size: 26px; line-height: 1.2;
            padding: 10px; outline: none; 
            border: 2px solid var(--border-color);
            transition: background-color 0.3s ease;
        }
        
        /* --- SCROLLBAR RETRO VIA CODICE --- */
        textarea::-webkit-scrollbar { 
            width: 24px; 
            background: var(--menu-bg); 
            border-left: 2px solid var(--border-color);
        }
        /* Il cursore (Thumb) */
        textarea::-webkit-scrollbar-thumb { 
            background: var(--menu-bg); 
            border-top: 2px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            box-shadow: inset 1px 1px var(--bevel-light);
        }
        /* I bottoni Su e Giù con i triangolini neri (Disegnati in SVG dentro il CSS) */
        textarea::-webkit-scrollbar-button:vertical:start:decrement { 
            display: block; height: 24px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,8 9,8 5,2" fill="black"/></svg>') center no-repeat, var(--menu-bg); 
            border-bottom: 2px solid var(--border-color); 
            box-shadow: inset 1px 1px var(--bevel-light);
        }
        textarea::-webkit-scrollbar-button:vertical:end:increment { 
            display: block; height: 24px; 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,2 9,2 5,8" fill="black"/></svg>') center no-repeat, var(--menu-bg); 
            border-top: 2px solid var(--border-color); 
            box-shadow: inset 1px 1px var(--bevel-light);
        }

    </style>
</head>
<body data-mode="light" data-palette="pink">

    <div class="window">
        <div class="title-bar">
            <div class="sys-btn"><div class="sys-line"></div></div>
            <div class="title-text">Nota Rapida - 4.1 Definitiva</div>
            <div class="window-btns">
                <div class="win-btn"><div class="icon-min"></div></div>
                <div class="win-btn"><div class="icon-max"></div></div>
                <div class="win-btn"><div class="icon-close">x</div></div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')"><span class="menu-icon">📄</span> New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')"><span class="menu-icon">💾</span> Save As .txt</div>
                    <div class="dropdown-item" onclick="document.getElementById('file-input').click()"><span class="menu-icon">📂</span> Open</div>
                    <input type="file" id="file-input" accept=".txt" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item"><span class="menu-icon">↶</span> <span class="disabled-text">Undo</span></div>
                    <div class="dropdown-item"><span class="menu-icon">↷</span> <span class="disabled-text">Redo</span></div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('cut')"><span class="menu-icon">✂</span> Cut</div>
                    <div class="dropdown-item" onclick="menuAction('copy')"><span class="menu-icon">📄</span> Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')"><span class="menu-icon">📋</span> Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')"><span class="menu-icon">☑</span> Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')"><span class="menu-icon">☀️</span> Notion Light</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')"><span class="menu-icon">📜</span> Notion Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')"><span class="menu-icon">🌙</span> Notion Dark</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #e89eb4;"></span> Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #b49ee8;"></span> Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #9eb4e8;"></span> Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #9ce8b4;"></span> Verde
                    </div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Retro Windows 3.1 Notepad\nDati salvati localmente.\nNessun PNG usato!')"><span class="menu-icon">❓</span> About</div>
                </div>
            </div>

        </div>

        <div class="window-body">
            <textarea id="notepad-text" spellcheck="false" placeholder="Inizia a digitare qui..."></textarea>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // --- GESTIONE DATI LOCALI ---
        textarea.value = localStorage.getItem('notion-win31-notepad') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-win31-notepad', textarea.value);
        });

        // --- GESTIONE TEMI E MODALITÀ ---
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-win31-mode', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-win31-palette', palette);
        }

        setNotionMode(localStorage.getItem('notion-win31-mode') || 'light');
        setThemePalette(localStorage.getItem('notion-win31-palette') || 'pink');

        // --- GESTIONE MENÙ A TENDINA ---
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // --- FUNZIONI DEI MENÙ ---
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Vuoi cancellare tutto il testo?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-win31-notepad', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'cut':
                    textarea.select();
                    document.execCommand('cut');
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-win31-notepad', textarea.value);
                    } catch (err) {
                        alert("Usa la scorciatoia Ctrl+V (o Cmd+V) per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }

        // --- FUNZIONE CARICAMENTO TESTO (IMPORT) ---
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                textarea.value = e.target.result;
                localStorage.setItem('notion-win31-notepad', textarea.value);
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }
    </script>
</body>
</html>
