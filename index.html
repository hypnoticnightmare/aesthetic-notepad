<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Aesthetic Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-bg: #FFFFFF; 
            
            /* Colori base del tema */
            --sys-bg: #EBA8BB;         /* Rosa scuro della finestra */
            --text-bg: #FDE8EF;        /* Rosa chiaro del foglio */
            --border-color: #000000;   /* Nero solido */
            --highlight: #FFFFFF;      /* Luce bordo 3D */
            --shadow: #000000;         /* Ombra bordo 3D */
            
            --menu-hover-bg: #000000;
            --menu-hover-text: #EBA8BB;
            --scroll-bg: #dfdfdf;      /* Grigio classico barra di scorrimento */
        }

        /* --- Sfondo di Notion --- */
        [data-mode="dark"] { --page-bg: #191919; }
        [data-mode="beige"] { --page-bg: #F7F6F3; }

        /* --- Palette Colori --- */
        [data-palette="pink"] { --sys-bg: #EBA8BB; --text-bg: #FDE8EF; --menu-hover-text: #EBA8BB; }
        [data-palette="green"] { --sys-bg: #A8EBA8; --text-bg: #E8FDE8; --menu-hover-text: #A8EBA8; }
        [data-palette="blue"] { --sys-bg: #A8BEEB; --text-bg: #E8EEFD; --menu-hover-text: #A8BEEB; }
        [data-palette="purple"] { --sys-bg: #D4A8EB; --text-bg: #F4E8FD; --menu-hover-text: #D4A8EB; }

        /* Regolazioni Testo Dark Mode */
        [data-mode="dark"][data-palette="pink"] { --text-bg: #2a1a20; --border-color: #000; }
        [data-mode="dark"][data-palette="green"] { --text-bg: #1a2a1a; }
        [data-mode="dark"][data-palette="blue"] { --text-bg: #1a1e2a; }
        [data-mode="dark"][data-palette="purple"] { --text-bg: #261a2a; }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        * { box-sizing: border-box; }

        /* --- LA FINESTRA PRINCIPALE --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--sys-bg);
            border: 2px solid var(--border-color);
            box-shadow: inset 1px 1px var(--highlight), 3px 3px 0 rgba(0,0,0,1);
            display: flex; flex-direction: column;
            padding: 2px;
        }

        /* --- BARRA DEL TITOLO --- */
        .title-bar {
            display: flex; justify-content: space-between; align-items: center;
            height: 26px; padding: 0 4px;
            margin-bottom: 2px;
        }
        
        /* Nuova Icona Computer con Cuore (Disegnata in CSS Base64!) */
        .sys-icon-box {
            width: 20px; height: 20px;
            border: 2px solid var(--border-color);
            background-color: #dfdfdf;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 1px 1px var(--highlight);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges"><path fill="%23000" d="M2,2 h12 v10 h-12 z M4,12 h8 v2 h-8 z"/><path fill="%23EFEFEF" d="M3,3 h10 v8 h-10 z M5,13 h6 v1 h-6 z"/><path fill="%23111" d="M4,4 h8 v5 h-8 z"/><path fill="%23000" d="M10,10 h2 v1 h-2 z"/><path fill="%23FF3366" d="M6,5 h1 v1 h-1 z M9,5 h1 v1 h-1 z M5,6 h6 v1 h-6 z M6,7 h4 v1 h-4 z M7,8 h2 v1 h-2 z"/></svg>');
            background-size: 14px;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Strisce Orizzontali */
        .title-stripes {
            flex-grow: 1; height: 12px; margin: 0 8px;
            background: repeating-linear-gradient(to bottom, transparent, transparent 1px, var(--border-color) 1px, var(--border-color) 2px);
        }

        /* Titolo in Arial */
        .title-text {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px; font-weight: bold; letter-spacing: 0.5px;
            color: var(--border-color); padding: 0 8px; white-space: nowrap;
        }

        /* Pulsanti stile PNG caricati */
        .window-btns { display: flex; gap: 2px; }
        .win-btn {
            width: 20px; height: 20px;
            border: 2px solid var(--border-color);
            background-color: var(--sys-bg);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            box-shadow: inset 1px 1px var(--highlight);
        }
        .win-btn:active { background-color: var(--border-color); color: var(--highlight); }
        .icon-min { width: 8px; height: 2px; background: currentColor; margin-top: 8px; }
        .icon-max { width: 10px; height: 8px; border: 2px solid currentColor; border-top-width: 3px; }
        .icon-close { font-family: sans-serif; font-size: 16px; line-height: 1; margin-bottom: 2px; font-weight: bold; }

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; padding-left: 4px;
            border-bottom: 2px solid var(--border-color);
            position: relative; z-index: 10; margin-bottom: 2px;
        }
        
        .menu-item {
            font-size: 22px; padding: 2px 8px;
            cursor: pointer; position: relative; user-select: none;
            border: 2px solid transparent; 
            margin-bottom: -2px; 
            z-index: 11;
        }
        
        .menu-item.active { 
            background-color: var(--sys-bg); 
            border: 2px solid var(--border-color);
            border-bottom: 2px solid var(--sys-bg); 
            z-index: 13;
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: 100%; left: -2px;
            background-color: var(--sys-bg); min-width: 160px;
            border: 2px solid var(--border-color);
            z-index: 12; color: var(--border-color);
            padding: 2px;
            box-shadow: 3px 3px 0px var(--border-color);
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 4px 10px; font-size: 22px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .dropdown-item:hover { 
            background-color: var(--menu-hover-bg); 
            color: var(--menu-hover-text); 
        }
        .dropdown-divider { 
            height: 2px; background-color: var(--border-color); margin: 2px 0; 
        }
        .menu-icon { width: 22px; text-align: center; font-size: 18px; filter: grayscale(1); }
        
        .color-preview {
            width: 14px; height: 14px; border: 2px solid var(--border-color);
            display: inline-block; margin-right: 4px;
        }

        /* --- AREA DI TESTO E SCROLLBAR RIGIDA --- */
        .window-body {
            flex-grow: 1; display: flex;
            background-color: var(--sys-bg); padding: 0;
        }
        .textarea-container {
            flex-grow: 1; border: 2px solid var(--border-color);
            background-color: var(--text-bg);
            display: flex;
        }

        textarea {
            flex-grow: 1; resize: none; box-sizing: border-box;
            background-color: transparent; 
            color: var(--border-color); 
            font-size: 24px; line-height: 1.2;
            padding: 10px; outline: none; border: none;
        }
        
        /* Gestione Scelta Font */
        [data-font="pixel"] textarea { font-family: 'VT323', monospace; font-size: 26px; }
        [data-font="arial"] textarea { font-family: Arial, Helvetica, sans-serif; font-size: 16px; line-height: 1.5; }
        [data-mode="dark"] textarea { color: var(--highlight); }

        /* Scrollbar basata sui tuoi PNG */
        textarea::-webkit-scrollbar { width: 22px; background: var(--scroll-bg); border-left: 2px solid var(--border-color); }
        textarea::-webkit-scrollbar-track { 
            background: var(--scroll-bg); 
            border-left: 2px solid var(--border-color);
        }
        textarea::-webkit-scrollbar-thumb { 
            background: var(--scroll-bg); 
            border: 2px solid var(--border-color);
            box-shadow: inset 1px 1px var(--highlight);
        }
        textarea::-webkit-scrollbar-button { 
            display: block; height: 22px; 
            background-color: var(--scroll-bg); 
            border: 2px solid var(--border-color); 
            box-shadow: inset 1px 1px var(--highlight);
        }
        /* Frecce disegnate in SVG */
        textarea::-webkit-scrollbar-button:vertical:start:decrement { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" shape-rendering="crispEdges"><polygon points="1,8 9,8 5,2" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 10px;
        }
        textarea::-webkit-scrollbar-button:vertical:end:increment { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10" shape-rendering="crispEdges"><polygon points="1,2 9,2 5,8" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 10px;
        }
    </style>
</head>
<body data-mode="light" data-palette="pink" data-font="pixel">

    <div class="window">
        <div class="title-bar">
            <div class="sys-icon-box"></div>
            <div class="title-stripes"></div>
            <div class="title-text">Nota Rapida - 4.1 Definitiva</div>
            <div class="title-stripes"></div>
            <div class="window-btns">
                <div class="win-btn"><div class="icon-min"></div></div>
                <div class="win-btn"><div class="icon-max"></div></div>
                <div class="win-btn"><div class="icon-close">x</div></div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')"><span class="menu-icon">📄</span> New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')"><span class="menu-icon">💾</span> Save As...</div>
                    <div class="dropdown-item" onclick="document.getElementById('file-input').click()"><span class="menu-icon">📂</span> Open...</div>
                    <input type="file" id="file-input" accept=".txt" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item" onclick="menuAction('undo')"><span class="menu-icon">↶</span> Undo</div>
                    <div class="dropdown-item" onclick="menuAction('redo')"><span class="menu-icon">↷</span> Redo</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('cut')"><span class="menu-icon">✂</span> Cut</div>
                    <div class="dropdown-item" onclick="menuAction('copy')"><span class="menu-icon">📑</span> Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')"><span class="menu-icon">📋</span> Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')"><span class="menu-icon">☑</span> Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'font')">Font
                <div class="dropdown" id="dropdown-font">
                    <div class="dropdown-item" onclick="setTextFont('pixel')"><span class="menu-icon">A</span> Pixel</div>
                    <div class="dropdown-item" onclick="setTextFont('arial')"><span class="menu-icon">A</span> Arial</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')"><span class="menu-icon">☀️</span> Luce</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')"><span class="menu-icon">📜</span> Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')"><span class="menu-icon">🌙</span> Notte</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #EBA8BB;"></span> Tema Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #D4A8EB;"></span> Tema Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #A8BEEB;"></span> Tema Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #A8EBA8;"></span> Tema Verde
                    </div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Notepad OS 7 \nDati salvati localmente.')"><span class="menu-icon">❓</span> About</div>
                </div>
            </div>
        </div>

        <div class="window-body">
            <div class="textarea-container">
                <textarea id="notepad-text" spellcheck="false" placeholder="Scrivi i tuoi appunti qui..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // --- SALVATAGGIO TESTO LOCALE ---
        textarea.value = localStorage.getItem('notion-mac-notepad-v6') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-mac-notepad-v6', textarea.value);
        });

        // --- GESTIONE PREFERENZE GRAFICHE E FONT ---
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-notepad-mode-v6', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-notepad-palette-v6', palette);
        }
        function setTextFont(fontType) {
            document.body.setAttribute('data-font', fontType);
            localStorage.setItem('notion-notepad-font-v6', fontType);
        }

        setNotionMode(localStorage.getItem('notion-notepad-mode-v6') || 'light');
        setThemePalette(localStorage.getItem('notion-notepad-palette-v6') || 'pink');
        setTextFont(localStorage.getItem('notion-notepad-font-v6') || 'pixel');

        // --- LOGICA DI APERTURA E CHIUSURA MENÙ ---
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // --- AZIONI DEI PULSANTI ---
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Sei sicuro di voler svuotare il blocco note?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-mac-notepad-v6', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'undo':
                    document.execCommand('undo'); 
                    break;
                case 'redo':
                    document.execCommand('redo'); 
                    break;
                case 'cut':
                    textarea.select();
                    document.execCommand('cut');
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-mac-notepad-v6', textarea.value);
                    } catch (err) {
                        alert("Premi la scorciatoia Ctrl+V (o Cmd+V) sulla tastiera per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                textarea.value = e.target.result;
                localStorage.setItem('notion-mac-notepad-v6', textarea.value);
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }
    </script>
</body>
</html>
