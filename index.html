<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Win/Mac 100% Accurate Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sfondo di Notion */
            --page-bg: #FFFFFF; 
            
            /* Colori esatti campionati dalla tua immagine */
            --sys-bg: #ECAABF;         /* Rosa principale della finestra */
            --text-bg: #FDE8EF;        /* Rosa chiarissimo del foglio */
            --border-color: #000000;   /* Nero puro */
            --highlight: #FFFFFF;      /* Luce per il finto 3D */
            --shadow: #000000;         /* Ombra del finto 3D */
            --menu-hover-bg: #000000;
            --menu-hover-text: #ECAABF;
        }

        [data-mode="dark"] { --page-bg: #191919; }
        [data-mode="beige"] { --page-bg: #F7F6F3; }

        /* Palette Dinamiche mantenendo lo stile */
        [data-palette="pink"] { --sys-bg: #ECAABF; --text-bg: #FDE8EF; --menu-hover-text: #ECAABF; }
        [data-palette="green"] { --sys-bg: #A3D8A8; --text-bg: #E8FDF0; --menu-hover-text: #A3D8A8; }
        [data-palette="blue"] { --sys-bg: #A3B5D8; --text-bg: #E8F0FD; --menu-hover-text: #A3B5D8; }
        [data-palette="purple"] { --sys-bg: #C1A3D8; --text-bg: #F2E8FD; --menu-hover-text: #C1A3D8; }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        * { box-sizing: border-box; }

        /* --- FINESTRA PRINCIPALE --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--sys-bg);
            border: 1px solid var(--border-color);
            /* Doppio bordo: nero fuori, bianco/nero dentro per l'effetto System 7 */
            box-shadow: inset 1px 1px var(--highlight), inset -1px -1px var(--shadow), 3px 3px 0 rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            padding: 2px;
        }

        /* --- BARRA DEL TITOLO --- */
        .title-bar {
            display: flex; justify-content: space-between; align-items: center;
            height: 24px; padding: 0 2px;
            position: relative; margin-bottom: 2px;
        }
        
        /* Linee orizzontali stile Mac OS System 7 */
        .title-stripes {
            position: absolute; top: 2px; left: 24px; right: 60px; bottom: 2px;
            background: repeating-linear-gradient(
                to bottom,
                transparent, transparent 1px,
                var(--border-color) 1px, var(--border-color) 2px
            );
            z-index: 1;
        }
        
        .title-text {
            font-size: 18px; letter-spacing: 0.5px; line-height: 24px;
            background-color: var(--sys-bg); /* Copre le strisce al centro */
            padding: 0 8px; z-index: 2; margin: 0 auto; color: var(--border-color);
        }

        /* Bottoni della barra del titolo */
        .sys-btn {
            width: 16px; height: 16px; z-index: 2;
            border: 1px solid var(--border-color);
            background-color: var(--sys-bg);
            box-shadow: inset 1px 1px var(--highlight), inset -1px -1px var(--shadow);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .sys-btn:active { box-shadow: inset 1px 1px var(--shadow), inset -1px -1px var(--highlight); }
        
        /* Icone interne disegnate in CSS */
        .icon-sys { width: 8px; height: 2px; background: var(--border-color); }
        .icon-min { width: 6px; height: 2px; background: var(--border-color); margin-top: 6px; }
        .icon-max { width: 8px; height: 6px; border: 1px solid var(--border-color); border-top-width: 2px; }
        .icon-close { width: 8px; height: 8px; background: repeating-linear-gradient(45deg, transparent, transparent 3px, var(--border-color) 3px, var(--border-color) 4px); }
        
        .window-btns { display: flex; gap: 2px; z-index: 2; }

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; padding-left: 4px;
            border-bottom: 1px solid var(--border-color);
            position: relative; z-index: 10; margin-bottom: 2px;
        }
        
        .menu-item {
            font-size: 20px; padding: 2px 8px;
            cursor: pointer; position: relative; user-select: none;
            border: 1px solid transparent; 
            margin-bottom: -1px; /* Scavalca la linea inferiore */
            z-index: 11;
        }
        
        .menu-item.active { 
            background-color: var(--sys-bg); 
            border: 1px solid var(--border-color);
            border-bottom: 1px solid var(--sys-bg); /* Fonde la linguetta col menù */
            z-index: 13;
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: 100%; left: -1px;
            background-color: var(--sys-bg); min-width: 150px;
            border: 1px solid var(--border-color);
            z-index: 12; color: var(--border-color);
            padding: 1px;
            /* L'ombra nera dura della tua immagine */
            box-shadow: 3px 3px 0px var(--border-color);
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 2px 10px; font-size: 20px;
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        /* Effetto hover inverso stile anni '90 */
        .dropdown-item:hover { 
            background-color: var(--menu-hover-bg); 
            color: var(--menu-hover-text); 
        }
        
        .dropdown-divider { 
            height: 1px; background-color: var(--border-color); 
            margin: 2px 0; 
        }
        .disabled-text { color: #666; }

        /* Anteprime Colori */
        .color-preview {
            width: 12px; height: 12px; border: 1px solid var(--border-color);
            display: inline-block; margin-right: 4px;
        }

        /* --- AREA DI TESTO --- */
        .window-body {
            flex-grow: 1; display: flex;
            background-color: var(--sys-bg); padding: 0;
            border: 1px solid var(--border-color);
        }
        
        .textarea-container {
            flex-grow: 1; border-right: 1px solid var(--border-color);
            background-color: var(--text-bg);
        }

        textarea {
            width: 100%; height: 100%; resize: none; box-sizing: border-box;
            background-color: transparent; color: var(--border-color);
            font-family: 'VT323', monospace; font-size: 24px; line-height: 1.1;
            padding: 8px; outline: none; border: none;
        }
        
        /* --- SCROLLBAR RETRO DI PRECISIONE --- */
        textarea::-webkit-scrollbar { width: 16px; background: var(--sys-bg); border-left: 1px solid var(--border-color); }
        
        /* Il pattern a puntini di sfondo (dithering) generato in CSS */
        textarea::-webkit-scrollbar-track { 
            background-image: 
                linear-gradient(45deg, #bbb 25%, transparent 25%, transparent 75%, #bbb 75%, #bbb),
                linear-gradient(45deg, #bbb 25%, transparent 25%, transparent 75%, #bbb 75%, #bbb);
            background-size: 2px 2px; background-position: 0 0, 1px 1px;
            border-left: 1px solid var(--border-color);
        }
        
        /* Cursore */
        textarea::-webkit-scrollbar-thumb { 
            background: var(--sys-bg); 
            border: 1px solid var(--border-color);
            box-shadow: inset 1px 1px var(--highlight), inset -1px -1px var(--shadow);
        }
        
        /* Bottoni freccia su e giù */
        textarea::-webkit-scrollbar-button { 
            display: block; height: 16px; 
            background-color: var(--sys-bg); 
            border: 1px solid var(--border-color); 
            box-shadow: inset 1px 1px var(--highlight), inset -1px -1px var(--shadow);
        }
        
        textarea::-webkit-scrollbar-button:vertical:start:decrement { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,8 9,8 5,2" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 8px;
        }
        textarea::-webkit-scrollbar-button:vertical:end:increment { 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 10"><polygon points="1,2 9,2 5,8" fill="black"/></svg>');
            background-position: center; background-repeat: no-repeat; background-size: 8px;
        }

    </style>
</head>
<body data-mode="light" data-palette="pink">

    <div class="window">
        <div class="title-bar">
            <div class="sys-btn"><div class="icon-sys"></div></div>
            <div class="title-stripes"></div>
            <div class="title-text">Nota Rapida - 4.2 Pixel Perfect</div>
            <div class="window-btns">
                <div class="sys-btn"><div class="icon-min"></div></div>
                <div class="sys-btn"><div class="icon-max"></div></div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')">New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')">Save As .txt</div>
                    <div class="dropdown-item" onclick="document.getElementById('file-input').click()">Open...</div>
                    <input type="file" id="file-input" accept=".txt" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item"><span class="disabled-text">Undo</span></div>
                    <div class="dropdown-item"><span class="disabled-text">Redo</span></div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('cut')">Cut</div>
                    <div class="dropdown-item" onclick="menuAction('copy')">Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')">Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')">Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')">Notion Light</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')">Notion Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')">Notion Dark</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #ECAABF;"></span> Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #C1A3D8;"></span> Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #A3B5D8;"></span> Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #A3D8A8;"></span> Verde
                    </div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Retro Pixel Notepad\nSenza PNG esterni!')">About</div>
                </div>
            </div>
        </div>

        <div class="window-body">
            <div class="textarea-container">
                <textarea id="notepad-text" spellcheck="false" placeholder="Inizia a digitare qui..."></textarea>
            </div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // DATI LOCALI
        textarea.value = localStorage.getItem('notion-retro-notepad-final') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-retro-notepad-final', textarea.value);
        });

        // TEMI E MODALITÀ
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-notepad-mode-final', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-notepad-palette-final', palette);
        }

        setNotionMode(localStorage.getItem('notion-notepad-mode-final') || 'light');
        setThemePalette(localStorage.getItem('notion-notepad-palette-final') || 'pink');

        // MENÙ
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // AZIONI
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Vuoi cancellare tutto il testo?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-retro-notepad-final', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'cut':
                    textarea.select();
                    document.execCommand('cut');
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-retro-notepad-final', textarea.value);
                    } catch (err) {
                        alert("Usa la scorciatoia Ctrl+V (o Cmd+V) per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                textarea.value = e.target.result;
                localStorage.setItem('notion-retro-notepad-final', textarea.value);
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }
    </script>
</body>
</html>
