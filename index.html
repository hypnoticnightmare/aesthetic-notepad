<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Notepad</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Sfondo di Notion */
            --page-bg: #FFFFFF; 
            
            /* Colori esatti campionati dalla tua immagine (Tema Rosa Default) */
            --title-bg: #E49CB2;      /* Rosa scuro barra del titolo */
            --menu-bg: #EBB6C6;       /* Rosa medio per menù e bordi */
            --text-bg: #FBE5EC;       /* Rosa chiarissimo per il foglio */
            --scroll-thumb: #D387A3;  /* Rosa scuro per la barra di scorrimento */
            
            --border-color: #000000;
            --text-color: #000000;
        }

        /* --- SFONDI NOTION --- */
        [data-mode="dark"] {
            --page-bg: #191919;
            /* In dark mode scurisci il testo e il foglio per non accecare */
            --text-bg: #2a1a20; 
            --text-color: #f0f0f0;
            --border-color: #000; 
        }
        [data-mode="beige"] { --page-bg: #F7F6F3; }

        /* --- PALETTE COLORI (Generati con la stessa logica di contrasto) --- */
        [data-palette="pink"] {
            --title-bg: #E49CB2; --menu-bg: #EBB6C6; --text-bg: #FBE5EC; --scroll-thumb: #D387A3;
        }
        [data-palette="green"] {
            --title-bg: #9CE4A5; --menu-bg: #B6EBC0; --text-bg: #E5FBE9; --scroll-thumb: #87D397;
        }
        [data-palette="blue"] {
            --title-bg: #9CA8E4; --menu-bg: #B6BFEB; --text-bg: #E5E9FB; --scroll-thumb: #879AD3;
        }
        [data-palette="purple"] {
            --title-bg: #C19CE4; --menu-bg: #D4B6EB; --text-bg: #F2E5FB; --scroll-thumb: #B187D3;
        }
        
        /* Adattamenti Dark Mode per i nuovi colori */
        [data-mode="dark"][data-palette="green"] { --text-bg: #1a2a1a; }
        [data-mode="dark"][data-palette="blue"] { --text-bg: #1a1e2a; }
        [data-mode="dark"][data-palette="purple"] { --text-bg: #261a2a; }

        body, html {
            margin: 0; padding: 10px;
            width: 100vw; height: 100vh;
            box-sizing: border-box;
            background-color: var(--page-bg);
            font-family: 'VT323', monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            transition: background-color 0.3s ease;
        }

        * { box-sizing: border-box; }

        /* --- LA FINESTRA RETRÒ --- */
        .window {
            width: 100%; height: 100%;
            background-color: var(--menu-bg);
            border: 2px solid var(--border-color);
            display: flex; flex-direction: column;
            transition: background-color 0.3s ease;
        }

        /* --- BARRA DEL TITOLO --- */
        .title-bar {
            background-color: var(--title-bg);
            color: var(--border-color);
            padding: 2px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-color);
            height: 28px;
        }
        
        /* Icona di sistema a sinistra */
        .sys-btn {
            width: 20px; height: 20px;
            border: 2px solid var(--border-color);
            background-color: var(--menu-bg);
            display: flex; justify-content: center; align-items: center;
            margin-left: 2px;
        }
        .sys-line { width: 10px; height: 2px; background-color: var(--border-color); }
        
        .title-text {
            font-size: 22px; font-weight: bold; letter-spacing: 0.5px;
            flex-grow: 1; text-align: center; margin-top: 2px;
        }
        
        /* Controlli finestra a destra */
        .window-btns { display: flex; gap: 2px; margin-right: 2px; }
        .win-btn {
            width: 20px; height: 20px;
            border: 2px solid var(--border-color);
            background-color: var(--menu-bg);
            display: flex; justify-content: center; align-items: center;
            font-size: 18px; font-weight: bold; line-height: 1;
            padding-bottom: 2px; cursor: pointer;
        }
        .win-btn:active { background-color: var(--border-color); color: var(--menu-bg); }

        /* --- BARRA DEI MENÙ --- */
        .menu-bar {
            display: flex; gap: 2px; padding: 0 4px;
            background-color: var(--menu-bg);
            border-bottom: 2px solid var(--border-color);
            position: relative; z-index: 10;
        }
        
        .menu-item {
            font-size: 22px; padding: 2px 6px;
            cursor: pointer; position: relative; user-select: none;
            border: 2px solid transparent; 
            margin-bottom: -2px; /* IL TRUCCO: Si sovrappone al bordo sottostante */
            z-index: 11;
        }
        
        /* Effetto linguetta unita al menù a tendina */
        .menu-item.active { 
            background-color: var(--menu-bg); 
            border: 2px solid var(--border-color);
            border-bottom: 2px solid var(--menu-bg); /* Nasconde la linea di divisione */
            z-index: 13;
        }

        /* --- TENDINE DEI MENÙ --- */
        .dropdown {
            display: none; position: absolute; top: 100%; left: -2px;
            background-color: var(--menu-bg); min-width: 180px;
            border: 2px solid var(--border-color);
            z-index: 12; color: var(--border-color);
            padding: 2px 0;
            /* L'ombra piatta retrò */
            box-shadow: 2px 2px 0px rgba(0,0,0,1);
        }
        .menu-item.active .dropdown { display: flex; flex-direction: column; }
        
        .dropdown-item {
            padding: 2px 10px; font-size: 22px;
            display: flex; align-items: center; gap: 8px;
        }
        .dropdown-item:hover { 
            background-color: var(--border-color); 
            color: var(--menu-bg); 
        }
        
        /* Il separatore a linea singola nera */
        .dropdown-divider { 
            height: 2px; background-color: var(--border-color); 
            margin: 2px 0; 
        }

        /* Icone e Quadrati per Anteprima Colori */
        .menu-icon { width: 20px; text-align: center; display: inline-block; font-size: 18px; }
        .color-preview {
            width: 14px; height: 14px; border: 2px solid var(--border-color);
            display: inline-block; margin-left: 2px; margin-right: 2px;
        }

        /* --- AREA DI TESTO --- */
        .window-body {
            flex-grow: 1; display: flex;
            background-color: var(--menu-bg); padding: 2px;
        }
        textarea {
            width: 100%; height: 100%; resize: none; box-sizing: border-box;
            background-color: var(--text-bg); color: var(--text-color);
            font-family: 'VT323', monospace; font-size: 24px; line-height: 1.2;
            padding: 8px; outline: none; border: none;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* --- SCROLLBAR RETRO ESATTA --- */
        textarea::-webkit-scrollbar { 
            width: 22px; 
            border-left: 2px solid var(--border-color); 
            background: var(--text-bg); 
        }
        textarea::-webkit-scrollbar-thumb { 
            background: var(--scroll-thumb); 
            border: 2px solid var(--border-color); 
        }
        textarea::-webkit-scrollbar-button { 
            display: block; height: 20px; 
            background-color: var(--menu-bg); 
            border: 2px solid var(--border-color); 
        }

    </style>
</head>
<body data-mode="light" data-palette="pink">

    <div class="window">
        <div class="title-bar">
            <div class="sys-btn"><div class="sys-line"></div></div>
            <div class="title-text">Nota Rapida - 4.1 Definitiva</div>
            <div class="window-btns">
                <div class="win-btn">_</div>
                <div class="win-btn">☐</div>
                <div class="win-btn">×</div>
            </div>
        </div>

        <div class="menu-bar" id="menu-bar">
            
            <div class="menu-item" onclick="toggleMenu(event, 'file')">File
                <div class="dropdown" id="dropdown-file">
                    <div class="dropdown-item" onclick="menuAction('new')"><span class="menu-icon">📄</span> New</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('save')"><span class="menu-icon">💾</span> Save As .txt</div>
                    <div class="dropdown-item" onclick="document.getElementById('file-input').click()"><span class="menu-icon">📂</span> Open</div>
                    <input type="file" id="file-input" accept=".txt" style="display: none;" onchange="importData(event)">
                </div>
            </div>
            
            <div class="menu-item" onclick="toggleMenu(event, 'edit')">Edit
                <div class="dropdown" id="dropdown-edit">
                    <div class="dropdown-item" onclick="menuAction('copy')"><span class="menu-icon">📑</span> Copy</div>
                    <div class="dropdown-item" onclick="menuAction('paste')"><span class="menu-icon">📋</span> Paste</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="menuAction('select-all')"><span class="menu-icon">☑</span> Select All</div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'palette')">Palette
                <div class="dropdown" id="dropdown-palette">
                    <div class="dropdown-item" onclick="setNotionMode('light')"><span class="menu-icon">☀️</span> Notion Light</div>
                    <div class="dropdown-item" onclick="setNotionMode('beige')"><span class="menu-icon">📜</span> Notion Beige</div>
                    <div class="dropdown-item" onclick="setNotionMode('dark')"><span class="menu-icon">🌙</span> Notion Dark</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" onclick="setThemePalette('pink')">
                        <span class="color-preview" style="background-color: #EBB6C6;"></span> Tema Rosa
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('purple')">
                        <span class="color-preview" style="background-color: #D4B6EB;"></span> Tema Viola
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('blue')">
                        <span class="color-preview" style="background-color: #B6BFEB;"></span> Tema Blu
                    </div>
                    <div class="dropdown-item" onclick="setThemePalette('green')">
                        <span class="color-preview" style="background-color: #B6EBC0;"></span> Tema Verde
                    </div>
                </div>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, 'help')">Help
                <div class="dropdown" id="dropdown-help">
                    <div class="dropdown-item" onclick="alert('Retro Notepad \nDati salvati localmente.')"><span class="menu-icon">❓</span> About</div>
                </div>
            </div>

        </div>

        <div class="window-body">
            <textarea id="notepad-text" spellcheck="false" placeholder="Inizia a digitare qui..."></textarea>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('notepad-text');

        // --- GESTIONE DATI LOCALI ---
        textarea.value = localStorage.getItem('notion-retro-notepad-v2') || '';
        textarea.addEventListener('input', () => {
            localStorage.setItem('notion-retro-notepad-v2', textarea.value);
        });

        // --- GESTIONE TEMI E MODALITÀ ---
        function setNotionMode(mode) {
            document.body.setAttribute('data-mode', mode);
            localStorage.setItem('notion-notepad-mode-v2', mode);
        }
        function setThemePalette(palette) {
            document.body.setAttribute('data-palette', palette);
            localStorage.setItem('notion-notepad-palette-v2', palette);
        }

        // Caricamento preferenze
        setNotionMode(localStorage.getItem('notion-notepad-mode-v2') || 'light');
        setThemePalette(localStorage.getItem('notion-notepad-palette-v2') || 'pink');

        // --- GESTIONE MENÙ A TENDINA ---
        function toggleMenu(event, menuName) {
            event.stopPropagation(); 
            document.querySelectorAll('.menu-item').forEach(item => {
                if(item !== event.currentTarget) item.classList.remove('active');
            });
            event.currentTarget.classList.toggle('active');
        }

        window.onclick = function() {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        }

        // --- FUNZIONI DEI MENÙ FILE ED EDIT ---
        async function menuAction(action) {
            switch(action) {
                case 'new':
                    if(confirm("Vuoi cancellare tutto il testo?")) {
                        textarea.value = '';
                        localStorage.setItem('notion-retro-notepad-v2', '');
                    }
                    break;
                case 'save':
                    const blob = new Blob([textarea.value], { type: 'text/plain' });
                    const anchor = document.createElement('a');
                    anchor.download = 'Nota_Rapida.txt';
                    anchor.href = window.URL.createObjectURL(blob);
                    anchor.click();
                    break;
                case 'copy':
                    textarea.select();
                    document.execCommand('copy');
                    window.getSelection().removeAllRanges();
                    break;
                case 'paste':
                    try {
                        const text = await navigator.clipboard.readText();
                        const start = textarea.selectionStart;
                        const end = textarea.selectionEnd;
                        textarea.value = textarea.value.substring(0, start) + text + textarea.value.substring(end);
                        localStorage.setItem('notion-retro-notepad-v2', textarea.value);
                    } catch (err) {
                        alert("Usa la scorciatoia Ctrl+V (o Cmd+V) per incollare.");
                    }
                    break;
                case 'select-all':
                    textarea.select();
                    break;
            }
        }

        // --- FUNZIONE CARICAMENTO TESTO (IMPORT) ---
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                textarea.value = e.target.result;
                localStorage.setItem('notion-retro-notepad-v2', textarea.value);
            };
            reader.readAsText(file);
            event.target.value = ''; // Resetta input
        }
    </script>
</body>
</html>
